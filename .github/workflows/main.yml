name: Stripper Scrapper
on:
  workflow_dispatch:
  # GitHub usa UTC. 09:00 UTC = 06:00 em Brasília (UTC−3, sem horário de verão).
  schedule:
    - cron: '0 9 * * *'
# Só leitura neste repo; o push dos dados usa PAT noutro repositório.
permissions:
  contents: read
jobs:
  run-scrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
      # --install-deps falha sem root e, com sudo, o Chrome ia para ~/.cache do root — o job corre como runner.
      - name: Install OS libraries for Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates fonts-liberation \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libcairo2 libcups2t64 \
            libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0t64 libgtk-3-0t64 \
            libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 \
            xdg-utils

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      # --sequential: um browser faz aulas e depois documentos com crawl BFS completo.
      # Com --workers em cluster, documentos dependem só do mapa inicial; se a descoberta vier vazia, o fluxo fica frágil no CI.
      - name: Execute scrapper
        run: node main.js --all --sequential
        env:
          CI: 'true'
          HEADLESS: 'true'
          # Código usa FACULDADE_USER (.env.example); USER_LOGIN mantém compat. com secrets antigos
          FACULDADE_USER: ${{ secrets.FACULDADE_USER || secrets.USER_LOGIN }}
          FACULDADE_PASS: ${{ secrets.FACULDADE_PASS }}
          CLASSES_URL: ${{ secrets.CLASSES_URL }}
