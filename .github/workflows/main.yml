- name: Push downloads to data repository
        env:
          # Destino atualizado para o repositório solicitado
          DATA_REPO: 'GaabDevWeb/ISS'
          DATA_BRANCH: ${{ vars.DOWNLOADS_BRANCH }}
          # Secret atualizado para ISS_REPO_TOKEN
          TOKEN: ${{ secrets.ISS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::Falta secret com PAT para push em ${DATA_REPO}."
            echo "No repositório DO SCRAPER: Settings → Secrets and variables → Actions → New repository secret."
            echo "Nome: ISS_REPO_TOKEN. Valor: Personal Access Token com escrita no repo de destino."
            echo "Criar token: GitHub → Settings (da tua conta) → Developer settings → Personal access tokens."
            exit 1
          fi
          BRANCH="${DATA_BRANCH:-main}"
          if [ ! -d "${GITHUB_WORKSPACE}/downloads" ] || [ -z "$(ls -A "${GITHUB_WORKSPACE}/downloads" 2>/dev/null || true)" ]; then
            echo "::warning::Pasta downloads/ vazia ou inexistente; nada a enviar."
            exit 0
          fi
          git clone --depth 1 -b "$BRANCH" "https://x-access-token:${TOKEN}@github.com/${DATA_REPO}.git" /tmp/data-repo
          mkdir -p /tmp/data-repo/downloads
          rsync -a "${GITHUB_WORKSPACE}/downloads/" /tmp/data-repo/downloads/
          cd /tmp/data-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f downloads/
          if git diff --staged --quiet; then
            echo "Sem alterações no repositório de dados."
          else
            git commit -m "chore: dados do scraper [skip ci]"
            git push origin "$BRANCH"
          fi
