name: Stripper Scrapper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: read

# ISS_REPO_TOKEN: o push é para https://github.com/GaabDevWeb/ISS — o PAT tem de ter permissão
# de escrita nesse repo (fine-grained: "Contents" read/write no ISS; classic: scope repo + acesso ao ISS).
# Admin apenas no STRIPPERscrapper não concede push ao ISS (são repositórios diferentes).

jobs:
  run-scrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install OS libraries for Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates fonts-liberation \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libcairo2 libcups2t64 \
            libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0t64 libgtk-3-0t64 \
            libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 \
            xdg-utils

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      # Dois passos: documentos correm mesmo se aulas falharem (sem depender de fail-fast interno).
      - name: Scraper — aulas
        id: scraper_lessons
        continue-on-error: true
        run: node main.js --lessons --sequential
        env:
          CI: 'true'
          HEADLESS: 'true'
          FACULDADE_USER: ${{ secrets.FACULDADE_USER || secrets.USER_LOGIN }}
          FACULDADE_PASS: ${{ secrets.FACULDADE_PASS }}
          CLASSES_URL: ${{ secrets.CLASSES_URL }}
          DOCUMENTS_URL: ${{ secrets.DOCUMENTS_URL }}

      - name: Scraper — documentos
        id: scraper_docs
        continue-on-error: true
        run: node main.js --docs --sequential
        env:
          CI: 'true'
          HEADLESS: 'true'
          FACULDADE_USER: ${{ secrets.FACULDADE_USER || secrets.USER_LOGIN }}
          FACULDADE_PASS: ${{ secrets.FACULDADE_PASS }}
          CLASSES_URL: ${{ secrets.CLASSES_URL }}
          DOCUMENTS_URL: ${{ secrets.DOCUMENTS_URL }}

      - name: Scraper — veredito (aulas e/ou documentos)
        if: always()
        run: |
          if [ "${{ steps.scraper_lessons.outcome }}" = "failure" ] && [ "${{ steps.scraper_docs.outcome }}" = "failure" ]; then
            echo "::error::Aulas e documentos falharam — ver logs dos passos anteriores."
            exit 1
          fi
          if [ "${{ steps.scraper_docs.outcome }}" = "failure" ]; then
            echo "::warning::Módulo documentos falhou — pode não haver downloads/documents/ para commit."
          fi

      - name: Resumo da pasta downloads (diagnóstico)
        if: always()
        run: |
          if [ -d downloads ]; then
            echo "=== Árvore downloads (máx. 4 níveis) ==="
            find downloads -maxdepth 4 -type d | head -200
            echo "=== documents/ ==="
            ls -la downloads/documents 2>/dev/null || echo "(pasta downloads/documents ausente ou vazia)"
          else
            echo "(pasta downloads ausente)"
          fi

      # Com push para outro repo, o passo anterior pode ter falhado parcialmente; ainda assim
      # sincronizamos o que existir em downloads/ (rsync + commit no ISS).
      - name: Commit downloads to ISS repo
        if: always()
        env:
          ISS_TOKEN: ${{ secrets.ISS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ISS_TOKEN:-}" ]; then
            echo "::error::Configure o secret ISS_REPO_TOKEN (fine-grained ou classic PAT) com permissão contents:write em https://github.com/GaabDevWeb/ISS"
            exit 1
          fi
          if [ ! -d downloads ]; then
            echo "::warning::Pasta downloads/ inexistente após o scraper; skip push ao ISS"
            exit 0
          fi
          rm -rf .iss-sync
          git clone --depth 1 "https://x-access-token:${ISS_TOKEN}@github.com/GaabDevWeb/ISS.git" .iss-sync
          mkdir -p .iss-sync/downloads
          rsync -a --delete downloads/ .iss-sync/downloads/
          cd .iss-sync
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -f: ficheiros ignorados por .gitignore no repo ISS continuam a ser versionados (ex.: extensões raras).
          git add -f downloads/
          if git diff --staged --quiet; then
            echo "Sem alterações em downloads/ no repo ISS"
          else
            git commit -m "chore: dados do scraper STRIPPERscrapper [skip ci]"
            git push origin HEAD
          fi
